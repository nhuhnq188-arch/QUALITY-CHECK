                });
                const blob = new Blob([header + body + "</body></html>"], { type: 'application/msword' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `BaiTapDich_Unit4_KetQua.doc`;
                link.click();

                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={saveProgress} className={`px-4 py-2 rounded-lg text-xs font-bold border flex items-center gap-2 transition-all ${showSuccess ? 'bg-green-500 text-white border-green-500' : 'bg-white text-slate-700 border-slate-200 hover:bg-slate-50'}`}>

                        <div className="bg-white rounded-2xl shadow-xl border-2 border-indigo-100 overflow-hidden transition-all focus-within:border-indigo-400">
                            <div className="bg-indigo-50/50 px-4 py-2 border-b border-indigo-100 flex justify-between items-center">
                                <span className="text-[10px] font-black text-indigo-400 uppercase tracking-wider">Bản dịch của bạn</span>
                                <span className="text-[10px] text-slate-400 font-medium italic">Edit freely</span>
                            </div>
                            <textarea value={currentStudentTranslation} onChange={handleTranslationChange} className="w-full h-72 p-6 text-xl font-serif outline-none resize-none leading-relaxed text-slate-800" placeholder="Type your translation here..." />
                        </div>

                        {/* Vocabulary Notes Section - Updated UI */}
                        <section className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                            <div className="bg-slate-900 px-5 py-3 flex items-center justify-between">
                                <h3 className="font-bold text-white text-xs flex items-center gap-2 uppercase tracking-widest">
                                    <i data-lucide="book-open" className="text-emerald-400 w-4 h-4"></i> Thuật ngữ trọng tâm
                                </h3>
                                <span className="text-[9px] text-slate-500 uppercase font-bold">Vocabulary Glossary</span>
                            </div>
                            <div className="divide-y divide-slate-100">
                                {currentPara.keywords.map((kw, i) => (
                                    <div key={i} className="p-4 sm:grid sm:grid-cols-12 gap-6 items-start hover:bg-slate-50/50 transition-colors">
                                        <div className="sm:col-span-5 mb-3 sm:mb-0">
                                            <div className="font-extrabold text-indigo-700 text-base leading-tight">{kw.word}</div>
                                            <div className="text-[11px] text-slate-500 mt-1 leading-relaxed italic">{kw.definition}</div>
                                        </div>
                                        <div className="sm:col-span-7">
                                            <input 
                                                type="text"
                                                value={vocabularyNotes[`${currentPara.id}-${kw.word}`] || ''}
                                                onChange={(e) => handleNoteChange(kw.word, e.target.value)}
                                                placeholder="Nghĩa/Ghi chú của bạn..."
                                                className="w-full bg-slate-100 border border-slate-200 rounded-md px-3 py-1.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all placeholder:text-slate-400"
                                            />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-8 z-50 border border-slate-800">
                        <button disabled={currentIndex === 0} onClick={() => { setCurrentIndex(currentIndex - 1); window.scrollTo(0, 0); }} className={`transition-colors p-2 rounded-full ${currentIndex === 0 ? 'text-slate-700' : 'hover:bg-slate-800 text-white'}`}><i data-lucide="chevron-left"></i></button>
                        <div className="flex flex-col items-center">
                            <span className="font-black text-sm tabular-nums tracking-tighter">ĐOẠN {currentIndex + 1} / {TRANSLATION_DATA.length}</span>
                            <div className="flex gap-1 mt-1">
                                {TRANSLATION_DATA.map((_, idx) => <div key={idx} className={`h-1 rounded-full transition-all ${idx === currentIndex ? 'bg-indigo-400 w-4' : 'bg-slate-700 w-1'}`} />)}
                            </div>
                        </div>
                        <button disabled={currentIndex === TRANSLATION_DATA.length - 1} onClick={() => { setCurrentIndex(currentIndex + 1); window.scrollTo(0, 0); }} className={`transition-colors p-2 rounded-full ${currentIndex === TRANSLATION_DATA.length - 1 ? 'text-slate-700' : 'hover:bg-slate-800 text-white'}`}><i data-lucide="chevron-right"></i></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        window.addEventListener('load', () => { if (window.lucide) window.lucide.createIcons(); });
    </script>
</body>
</html>
